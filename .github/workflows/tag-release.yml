name: Tag Release

# Runs on every merge to main. Only acts when the merge bumped the
# version in Cargo.toml to something not yet tagged - everything else
# is a no-op. Tags the commit, then explicitly dispatches release.yml
# for that tag.
#
# Why explicit dispatch instead of just pushing the tag: a tag pushed
# using the built-in GITHUB_TOKEN does not trigger other workflows (a
# deliberate GitHub Actions guard against workflow loops), so a plain
# `git push origin vX.Y.Z` here would silently never build a release.
#
# CHANGELOG.md is maintained by hand as part of the version-bump PR
# (see CONTRIBUTING.md) - this workflow does not touch it.

on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  tag-release:
    name: Tag on version bump
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already tagged
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "new=false" >> "$GITHUB_OUTPUT"
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag release commit
        if: steps.check.outputs.new == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Dispatch release build
        if: steps.check.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh workflow run release.yml --ref "v$VERSION" -f "tag=v$VERSION"
